apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  labels:
    app: devops-app
    environment: ${ENVIRONMENT}
spec:
  replicas: ${REPLICAS}
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
        environment: ${ENVIRONMENT}
    spec:
      containers:
      - name: app
        image: dockrphage/devops-app:${IMAGE_TAG}
        ports:
        - containerPort: 8080
        env:
        - name: APP_VERSION
          value: "${VERSION}"
        - name: ENVIRONMENT
          value: "${ENVIRONMENT}"
        resources:
          requests:
            memory: "${MEMORY_REQUEST}"
            cpu: "${CPU_REQUEST}"
          limits:
            memory: "${MEMORY_LIMIT}"
            cpu: "${CPU_LIMIT}"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: ${LIVENESS_DELAY}
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: ${READINESS_DELAY}
          periodSeconds: 5
